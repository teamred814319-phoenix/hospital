<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Doctor OTP Verification
</title>

<link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<div class="landing-container">

<div class="glass-card form-card">

<h2>

Email Verification

</h2>

<br>

<input
  type="email"
  id="doctorEmail"
  class="glass-input"
  placeholder="Email Address"
  readonly>

<br><br>

<button
id="sendOtpBtn"
class="btn doctor-btn">

Send OTP

</button>

<br><br>

<input
type="text"
id="otp"
class="glass-input"
placeholder="Enter OTP">

<br><br>

<button
id="verifyOtpBtn"
class="btn doctor-btn">

Verify OTP

</button>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/doctor.js"></script>

</body>

</html>
