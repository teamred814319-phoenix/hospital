<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>PHOENIX - Doctor Login</title>

    <link rel="stylesheet"
        href="../css/style.css">

</head>

<body>

    <div class="orb orb-pink"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-green"></div>

    <div class="landing-container">

        <div class="glass-card form-card">

            <h1 class="logo small-logo">
                PHOENIX
            </h1>

            <p class="subtitle">
                Doctor Login
            </p>

            <form id="doctorLoginForm">

                <input
                    type="email"
                    id="doctorEmail"
                    class="glass-input"
                    placeholder="Email Address"
                    required>

                <br><br>

                <input
                    type="password"
                    id="doctorPassword"
                    class="glass-input"
                    placeholder="Password"
                    required>

                <br><br>

                <button
                    type="submit"
                    class="btn doctor-btn">

                    LOGIN

                </button>
                <br>

<p>

New Doctor?

<a href="register.html">

Register Here

</a>

</p>

            </form>

        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/doctor.js"></script>

</body>
</html>
