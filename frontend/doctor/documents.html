<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Doctor Documents Upload
</title>

<link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<div class="orb orb-pink"></div>
<div class="orb orb-blue"></div>
<div class="orb orb-green"></div>

<div class="landing-container">

<div class="glass-card form-card">

<h1 class="logo">
PHOENIX
</h1>

<p class="subtitle">

Doctor Verification Documents

</p>

<br>

<label>
Profile Photo
</label>

<input
type="file"
id="profilePhoto"
class="glass-input">

<br><br>

<label>
Aadhaar Card
</label>

<input
type="file"
id="aadhaarDocument"
class="glass-input">

<br><br>

<label>
Medical License
</label>

<input
type="file"
id="licenseDocument"
class="glass-input">

<br><br>

<label>
Degree Certificate
</label>

<input
type="file"
id="degreeDocument"
class="glass-input">

<br><br>

<button
id="uploadDoctorDocumentsBtn"
class="btn doctor-btn">

Upload Documents

</button>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/doctor.js"></script>

</body>

</html>
