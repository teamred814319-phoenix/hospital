<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>PHOENIX - Patient Login</title>

    <link rel="stylesheet"
        href="../css/style.css">

</head>

<body>

    <div class="orb orb-pink"></div>
    <div class="orb orb-blue"></div>
    <div class="orb orb-green"></div>

    <div class="landing-container">

        <div class="glass-card form-card">

            <h1 class="logo small-logo">
                PHOENIX
            </h1>

            <p class="subtitle">
                Patient Login
            </p>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    class="glass-input"
                    placeholder="Email Address"
                    required>

                <br><br>

                <input
                    type="password"
                    id="password"
                    class="glass-input"
                    placeholder="Password"
                    required>

                <br><br>

                <button
                    type="submit"
                    class="btn patient-btn">

                    LOGIN

                </button>

            </form>

            <br>

            <p>

                New Patient?

                <a href="register.html">

                    Register

                </a>

            </p>

        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/patient.js"></script>

</body>

</html>
